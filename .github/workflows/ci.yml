name: Pipeline CI - Fábrica Académica (Node.js)

on:
  push:
    branches: [ main ]

jobs:
  ci:
    name: Integración Continua (Node.js & Calidad)
    runs-on: ubuntu-latest

    steps:
      # [PASO 2] Descarga del código fuente
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # [PASO 2] Configuración limpia de Node.js (Sin caché problemática)
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # [PASO 2] Instalación limpia de dependencias del Backend
      - name: Instalar dependencias del Backend
        run: |
          cd backend
          npm ci

      # [PASO 3] Análisis estático de código con SonarCloud
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend

  docker:
    name: Construcción y Push de Imagen Docker
    needs: ci # [PASO 4] Este job depende obligatoriamente de que el análisis 'ci' termine con éxito
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Configuración del motor de construcción Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # [PASO 4] Autenticación en GitHub Container Registry usando el token interno del repositorio
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # [PASO 4] Compilación local temporal de la imagen (Contexto apuntando a la subcarpeta backend)
      - name: Build imagen Docker (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true # Carga la imagen localmente en el runner para que Trivy pueda auditarla
          tags: ghcr.io/${{ github.repository }}:test

      # [PASO 3] Escaneo de vulnerabilidades críticas y altas en las dependencias del contenedor
      - name: Escaneo de Seguridad con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:test'
          format: 'table'
          exit-code: '0' # Permite continuar si encuentra alertas (puedes cambiarlo a '1' para bloquear deploys vulnerables)
          severity: 'CRITICAL,HIGH'

      # [PASO 4] Publicación oficial de la imagen en GHCR con etiquetas de control (Latest y SHA único)
      - name: Build and Push a GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}