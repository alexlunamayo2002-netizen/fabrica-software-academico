name: Pipeline CI - Fábrica Académica (Node.js)

on:
  push:
    branches: [ main ]

jobs:
  ci:
    name: Integración Continua (Node.js & Calidad)
    runs-on: ubuntu-latest

    steps:
      # [PASO 2] Descarga del código fuente
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # [PASO 2] Configuración limpia de Node.js (Sin caché problemática)
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # [PASO 2] Instalación limpia de dependencias del Backend
      - name: Instalar dependencias del Backend
        run: |
          cd backend
          npm ci

      # [PASO 3] Análisis estático de código con SonarCloud
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend